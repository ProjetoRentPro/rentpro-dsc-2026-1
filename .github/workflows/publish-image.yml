name: Publish Docker Image

on:
  push:
    branches: [main, develop]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  publish-image:
    name: Publicar imagem Docker
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: rentpro-backend

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: rentpro-backend/pnpm-lock.yaml

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Executar lint
        run: pnpm lint

      - name: Executar testes
        run: pnpm test

      - name: Executar build da aplicação
        run: pnpm build

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalizar nome da imagem para minúsculas
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        working-directory: .

      - name: Construir e publicar imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: rentpro-backend
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
